version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt_radar_broker
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # Service radar-mapper (polar radar) — point cloud tanpa garis penghubung
  radar-mapper:
    build: .
    container_name: python_radar
    environment:
      - DISPLAY=host.docker.internal:0
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_TOPIC=esp32/radar
    volumes:
      - .:/app
    depends_on:
      - mqtt-broker
    restart: "no"
    command: ["python", "radar_mapper.py"]

volumes:
  mosquitto_data:
  mosquitto_log:
